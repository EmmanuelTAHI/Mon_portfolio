<div class="image-viewer-container min-h-screen bg-black text-white relative overflow-hidden">
  <div class="absolute inset-0 grid-overlay-hero opacity-30" aria-hidden="true"></div>
  <div class="absolute inset-0 bg-gradient-to-b from-transparent via-neonGreen/5 to-transparent" aria-hidden="true"></div>

  <div class="relative z-10 container mx-auto px-4 py-12">
    <header class="terminal-header mb-8 flex items-center gap-2 px-4 py-2.5 bg-black/80 border border-neonGreen/30 rounded-t-xl">
      <span class="w-3 h-3 rounded-full bg-red-500/90" aria-hidden="true"></span>
      <span class="w-3 h-3 rounded-full bg-yellow-500/90" aria-hidden="true"></span>
      <span class="w-3 h-3 rounded-full bg-green-500/90" aria-hidden="true"></span>
      <button
        type="button"
        (click)="goBackToChallenge()"
        class="ml-3 flex items-center gap-1.5 px-2.5 py-1 rounded font-jetbrains text-xs text-neonGreen border border-neonGreen/50 hover:bg-neonGreen/10 hover:border-neonGreen transition-colors focus:outline-none focus:ring-2 focus:ring-neonGreen/50"
        aria-label="Back to challenge"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        <span>Back</span>
      </button>
      <span class="font-jetbrains text-gray-400 text-xs ml-3" aria-hidden="true">terminal — root&#64;sh00ter_X</span>
    </header>

    <main class="terminal-card bg-black/90 border border-neonGreen/30 rounded-b-xl p-8 shadow-[0_0_40px_rgba(0,255,159,0.2)]">
      <div class="animate-fade-in-up">
        <h2 class="font-jetbrains text-2xl font-bold text-neonGreen mb-4 text-center">
          🏠 Thank you so much!
        </h2>
        <p class="font-jetbrains text-gray-300 text-base mb-2 leading-relaxed text-center">
          You helped me reconnect my cameras.
        </p>
        <p class="font-jetbrains text-neonGreen text-lg font-semibold mb-6 text-center">
          Nice house, right? 😊
        </p>

        @if (errorMessage) {
          <div class="mb-6 bg-red-500/10 border border-red-500/50 rounded-lg p-4" role="alert">
            <p class="font-jetbrains text-red-400 text-center mb-3">{{ errorMessage }}</p>
            <div class="flex justify-center">
              <button type="button" (click)="retry()" class="font-jetbrains px-4 py-2 rounded border border-neonGreen text-neonGreen hover:bg-neonGreen/10 focus:outline-none focus:ring-2 focus:ring-neonGreen/50">
                Retry
              </button>
            </div>
          </div>
        }

        @if (imageUrl) {
          <div class="mb-6 rounded-lg overflow-hidden border-2 border-neonGreen/30 bg-black/50 p-2 flex justify-center items-center min-h-[200px]">
            <img [src]="imageUrl" alt="House" class="max-h-[500px] w-auto object-contain rounded-md" />
          </div>
        }

        @if (imageLoading) {
          <div class="mb-6 flex justify-center items-center min-h-[200px] text-neonGreen" aria-live="polite">
            <svg class="animate-spin h-8 w-8 text-neonGreen shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="ml-3 font-jetbrains">Loading image...</span>
          </div>
        }

        <div class="flex flex-col sm:flex-row gap-4">
          <button
            type="button"
            (click)="downloadImage()"
            [disabled]="!imageUrl || imageLoading"
            class="flex-1 btn-glitch py-3 font-jetbrains uppercase tracking-wider"
            [class.opacity-50]="!imageUrl || imageLoading"
            [class.cursor-not-allowed]="!imageUrl || imageLoading"
          >
            <span class="flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              <span>@if (imageLoading) { Loading... } @else { Download Image }</span>
            </span>
          </button>
          <button
            type="button"
            (click)="continue()"
            class="flex-1 btn-glitch py-3 font-jetbrains uppercase tracking-wider bg-neonGreen/10 hover:bg-neonGreen/20"
          >
            Continue
          </button>
        </div>
      </div>
    </main>
  </div>
</div>
