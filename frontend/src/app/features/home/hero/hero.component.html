<section class="hero min-h-[90vh] flex flex-col justify-center relative overflow-hidden pt-24 pb-16">
  <div class="grid-overlay-hero"></div>
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="absolute top-1/4 left-1/4 w-64 h-64 rounded-full bg-neonGreen/5 blur-3xl animate-float"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 rounded-full bg-neonGreen/5 blur-3xl animate-float" style="animation-delay: -2s;"></div>
    <div class="absolute top-1/2 left-1/2 w-40 h-40 rounded-full bg-white/5 blur-2xl animate-float" style="animation-delay: -1s;"></div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full relative z-10 flex-1 flex flex-col justify-center">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16 items-center">
      <!-- Gauche : contenu principal + terminal + bouton CV + réseaux -->
      <div class="animate-fade-in-up order-2 lg:order-1">
        <p class="font-jetbrains text-gray-400 text-base sm:text-lg uppercase tracking-widest mb-2">{{ roleLabel }}</p>
        <h1 class="font-jetbrains text-4xl sm:text-5xl lg:text-6xl font-bold text-white mb-1">
          H3ll0 I'm
        </h1>
        <h2 class="font-jetbrains text-4xl sm:text-5xl lg:text-6xl font-bold text-neonGreen tracking-wide mb-6 drop-shadow-[0_0_24px_rgba(0,255,159,0.4)]">
          {{ name }}
        </h2>

        <!-- Fenêtre terminal style Kali avec typing -->
        <div class="mb-8 relative z-10">
          <app-hero-terminal
            [role]="terminalRole"
            [fullName]="name"
            [description]="terminalDescription"
          />
        </div>

        <div class="flex flex-wrap items-center gap-4 relative z-10">
          <a
            [href]="cvUrl"
            download
            class="inline-flex items-center gap-2 px-6 py-3 rounded-lg border-2 border-neonGreen text-neonGreen font-jetbrains text-base sm:text-lg uppercase tracking-wider hover:bg-neonGreen/10 transition-all duration-300 relative z-10 pointer-events-auto"
          >
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Download CV
          </a>
          <div class="flex items-center gap-3 relative z-10">
            <a href="https://github.com/EmmanuelTAHI" target="_blank" rel="noopener noreferrer" class="w-11 h-11 rounded-full border-2 border-neonGreen/80 flex items-center justify-center text-gray-400 hover:bg-neonGreen/20 hover:border-neonGreen hover:text-white transition-all duration-300 relative z-10 pointer-events-auto" aria-label="GitHub">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            </a>
            <a href="https://www.linkedin.com/in/ezan-franck-emmanuel-tahi-47ab1b2a4/" target="_blank" rel="noopener noreferrer" class="w-11 h-11 rounded-full border-2 border-neonGreen/80 flex items-center justify-center text-gray-400 hover:bg-neonGreen/20 hover:border-neonGreen hover:text-white transition-all duration-300 relative z-10 pointer-events-auto" aria-label="LinkedIn">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </a>
          </div>
        </div>
      </div>

      <!-- Droite : photo de profil + cercle néon animé -->
      <div class="animate-fade-in-up order-1 lg:order-2 flex justify-center lg:justify-end" style="animation-delay: 0.15s;">
        <div class="hero-photo-wrapper relative w-64 h-64 sm:w-80 sm:h-80 lg:w-96 lg:h-96">
          <div class="hero-neon-ring"></div>
          <div 
            class="hero-photo-inner rounded-full overflow-hidden border-2 border-neonGreen/50 bg-darkBg/80 flex items-center justify-center cursor-pointer relative z-20"
            (mouseenter)="onProfileHover($event)"
            (mouseleave)="onProfileLeave()"
          >
            @if (profileImageUrl) {
              <img 
                [src]="profileImageUrl" 
                [alt]="name" 
                class="w-full h-full object-cover"
                draggable="true"
              />
            } @else {
              <span class="font-jetbrains text-5xl sm:text-6xl lg:text-7xl font-bold text-neonGreen/80 select-none pointer-events-none">{{ initials }}</span>
            }
          </div>
          
          <!-- Bouton Challenge animé -->
          @if (showChallengeButton) {
            <button
              class="challenge-button-hover absolute z-[100] px-3 py-2 font-jetbrains text-xs sm:text-sm uppercase tracking-wider text-neonGreen border-2 border-neonGreen rounded-lg bg-black/95 backdrop-blur-sm shadow-[0_0_20px_rgba(0,255,159,0.6)] hover:bg-neonGreen/10 hover:shadow-[0_0_30px_rgba(0,255,159,0.8)] transition-all duration-300 pointer-events-auto"
              [style.left.%]="challengeButtonPosition.x"
              [style.top.%]="challengeButtonPosition.y"
              [style.transform]="'translate(-50%, -50%)'"
              (mouseenter)="onChallengeButtonEnter()"
              (mouseleave)="onChallengeButtonLeave()"
              (click)="navigateToChallenge()"
            >
              <span class="flex items-center gap-1.5">
                <span>⚡</span>
                <span>Challenge</span>
              </span>
            </button>
          }
        </div>
      </div>
    </div>

    <!-- Statistiques en bas de la section Hero -->
    <div class="hero-stats mt-16 pt-12 border-t border-white/10">
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-8">
        @for (stat of stats; track stat.label) {
          <div class="stat-item text-center animate-fade-in-up" [style.animation-delay]="(0.1 * $index) + 's'">
            <p class="font-jetbrains text-3xl sm:text-4xl font-bold text-white tabular-nums">
              <span class="stat-number">{{ getDisplayStat($index) }}</span>
            </p>
            <p class="font-jetbrains text-gray-400 text-sm mt-1">{{ stat.label }}</p>
          </div>
        }
      </div>
    </div>
  </div>
</section>
