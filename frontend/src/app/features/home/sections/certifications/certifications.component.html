<section id="certifications" class="section scroll-mt-24">
  <app-section-title title="CERTIFICATIONS" subtitle="Badges and certifications from learning platforms." />
  <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (c of certs; track c.id) {
      <div class="cert-card terminal-card p-5 rounded-xl border border-white/10 hover:border-neonGreen/50 transition-all duration-300 flex items-center gap-4 group animate-fade-in-up">
        <div class="w-14 h-14 rounded-xl bg-neonGreen/10 border border-neonGreen/30 flex items-center justify-center group-hover:bg-neonGreen/10 group-hover:border-neonGreen/50 transition-colors">
          <svg class="w-7 h-7 text-neonGreen/90 group-hover:text-neonGreen transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>
        </div>
        <div class="flex-1">
          <h3 class="font-jetbrains text-neonGreen">{{ c.title }}</h3>
          <p class="font-jetbrains text-sm text-gray-400 dark:text-gray-400 text-gray-600">{{ c.issuer }}</p>
          @if (c.status === 'in-progress') {
            <span class="inline-block mt-2 px-2 py-0.5 rounded bg-accentPurple/20 text-accentPurple font-jetbrains text-xs border border-accentPurple/30">In Progress</span>
          }
          @else {
            <span class="inline-block mt-2 px-2 py-0.5 rounded bg-green-500/20 text-green-400 font-jetbrains text-xs border border-green-500/30">Completed</span>
          }
        </div>
        @if (c.credential_url) {
          <a [href]="c.credential_url" target="_blank" rel="noopener noreferrer" class="text-neonGreen/70 hover:text-neonGreen transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </a>
        }
      </div>
    }
  </div>
</section>
