<section id="experience" class="section scroll-mt-24">
  <app-section-title title="EXPERIENCE" subtitle="System log timeline — education, labs, CTF, and professional experience." />
  <div class="mt-8 relative">
    <div class="absolute left-4 md:left-6 top-0 bottom-0 w-px bg-gradient-to-b from-neonGreen/60 via-neonGreen/40 to-transparent"></div>
    <div class="space-y-6">
      @for (item of items; track item.id) {
          <div class="relative pl-12 md:pl-14 animate-fade-in-up">
            <span class="absolute left-0 w-4 h-4 rounded-full bg-neonGreen/90 border-2 border-darkBg shadow-[0_0_12px_rgba(0,255,159,0.5)]"></span>
            <div class="terminal-card p-5 rounded-xl border border-white/10 hover:border-neonGreen/50 transition-all duration-300 hover:shadow-neon-green/20">
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <h3 class="font-jetbrains text-neonGreen">{{ item.title }}</h3>
                <span class="text-neonGreen/90 font-jetbrains text-sm">&#64; {{ item.organization }}</span>
              </div>
              <p class="font-jetbrains text-xs text-gray-400 mb-2">
                {{ formatDate(item.start_date) }} — {{ (item.is_current && !item.end_date) ? 'Present' : formatDate(item.end_date) }}
              </p>
              <p class="font-jetbrains text-gray-400 text-sm">{{ item.description }}</p>
            </div>
          </div>
      }
    </div>
  </div>
</section>
