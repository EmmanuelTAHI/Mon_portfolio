<div class="terminal-window terminal-card rounded-xl overflow-hidden border border-white/10 shadow-neon-green animate-fade-in-up">
  <div class="terminal-header flex items-center gap-2 px-4 py-2.5 bg-black/60 border-b border-white/10">
    <span class="w-3 h-3 rounded-full bg-red-500/90"></span>
    <span class="w-3 h-3 rounded-full bg-yellow-500/90"></span>
    <span class="w-3 h-3 rounded-full bg-green-500/90"></span>
    <span class="font-jetbrains text-gray-400 text-xs ml-3">terminal — root&#64;sh00ter_X</span>
  </div>
  <div id="terminal-log" class="terminal-body font-jetbrains text-sm p-4 h-72 sm:h-80 overflow-y-auto bg-black/50 scroll-smooth">
    @for (line of log; track $index) {
      @switch (line.type) {
        @case ('input') {
          <div class="text-neonGreen mb-0.5">{{ line.text }}</div>
        }
        @case ('error') {
          <div class="text-red-400 mb-0.5">{{ line.text }}</div>
        }
        @case ('success') {
          <div class="text-neonGreen font-medium mb-0.5">{{ line.text }}</div>
        }
        @case ('info') {
          <div class="text-neonGreen/90 mb-0.5">{{ line.text }}</div>
        }
        @default {
          <div class="text-gray-300 mb-0.5">{{ line.text }}</div>
        }
      }
    }
    <div class="flex items-center gap-1 mt-1">
      <span class="text-neonGreen">{{ prompt }}</span>
      <input
        #inputEl
        type="text"
        [(ngModel)]="currentInput"
        (keydown.enter)="onSubmit()"
        class="flex-1 bg-transparent border-none outline-none text-gray-200 font-jetbrains ml-1 min-w-[120px]"
        placeholder=""
        autocomplete="off"
        spellcheck="false"
      />
      <span class="cursor-blink text-neonGreen inline-block w-2 h-4 bg-neonGreen ml-0.5 align-middle"></span>
    </div>
  </div>
</div>
