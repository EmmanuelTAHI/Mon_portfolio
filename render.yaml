# Render Blueprint - Backend Django (portfolio)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend

    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py load_initial_data && (python manage.py load_production_data --clear || true) && python manage.py collectstatic --noinput && mkdir -p static/media && cp -r media/* static/media/ && python manage.py diagnose_media
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DJANGO_DEBUG
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      # Formulaire de contact : voir DEPLOY.md section "Formulaire de contact (SMTP sur Render)".
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USE_TLS
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio
    user: portfolio
