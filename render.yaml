# Render Blueprint - Backend Django (portfolio)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend

    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py load_initial_data && (python manage.py load_production_data --clear || true) && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DJANGO_DEBUG
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      # BACKEND_PUBLIC_URL = URL du service (ex: https://portfolio-backend-xxx.onrender.com) pour que les images projets s'affichent.
      # Optionnel : SMTP_USER, SMTP_PASSWORD, CONTACT_EMAIL, etc.

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio
    user: portfolio
